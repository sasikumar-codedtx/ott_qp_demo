<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-label="OTT app launch to playback flow">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#070714"/>
      <stop offset="0.55" stop-color="#171022"/>
      <stop offset="1" stop-color="#241006"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0" stop-color="#161a28"/>
      <stop offset="1" stop-color="#24263a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset="0.5" stop-color="#c247ff"/>
      <stop offset="1" stop-color="#3186ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="360" rx="28" fill="url(#bg)"/>
  <g font-family="Inter, Arial, sans-serif" fill="#fff">
    <text x="48" y="58" font-size="28" font-weight="800">OTT App Flow</text>
    <text x="48" y="88" font-size="14" fill="#9aa4b2">From cold launch to playback, with profile and cohort as first-class inputs.</text>
  </g>
  <g transform="translate(42 132)">
    <g>
      <rect width="132" height="90" rx="18" fill="url(#card)" stroke="#34384a"/>
      <text x="66" y="36" text-anchor="middle" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#fff">Launch</text>
      <text x="66" y="60" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#9aa4b2">config + auth state</text>
    </g>
    <g transform="translate(164 0)">
      <rect width="132" height="90" rx="18" fill="url(#card)" stroke="#34384a"/>
      <text x="66" y="36" text-anchor="middle" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#fff">Profile</text>
      <text x="66" y="60" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#9aa4b2">local user state</text>
    </g>
    <g transform="translate(328 0)">
      <rect width="132" height="90" rx="18" fill="url(#card)" stroke="#34384a"/>
      <text x="66" y="36" text-anchor="middle" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#fff">Cohort</text>
      <text x="66" y="60" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#9aa4b2">pf mapping</text>
    </g>
    <g transform="translate(492 0)">
      <rect width="132" height="90" rx="18" fill="url(#card)" stroke="#34384a"/>
      <text x="66" y="36" text-anchor="middle" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#fff">Storefront</text>
      <text x="66" y="60" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#9aa4b2">tabs + rails</text>
    </g>
    <g transform="translate(656 0)">
      <rect width="132" height="90" rx="18" fill="url(#card)" stroke="#34384a"/>
      <text x="66" y="36" text-anchor="middle" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#fff">Detail</text>
      <text x="66" y="60" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#9aa4b2">metadata + moments</text>
    </g>
    <g transform="translate(820 0)">
      <rect width="132" height="90" rx="18" fill="url(#card)" stroke="#34384a"/>
      <text x="66" y="36" text-anchor="middle" font-family="Inter, Arial" font-size="15" font-weight="700" fill="#fff">Player</text>
      <text x="66" y="60" text-anchor="middle" font-family="Inter, Arial" font-size="12" fill="#9aa4b2">preview or full play</text>
    </g>
    <g stroke="url(#accent)" stroke-width="4" stroke-linecap="round" filter="url(#glow)">
      <path d="M132 45 H164"/>
      <path d="M296 45 H328"/>
      <path d="M460 45 H492"/>
      <path d="M624 45 H656"/>
      <path d="M788 45 H820"/>
    </g>
  </g>
  <g transform="translate(48 280)" font-family="Inter, Arial" font-size="13" fill="#d8dee9">
    <rect width="864" height="42" rx="16" fill="#0f1320" stroke="#283044"/>
    <text x="18" y="27">Critical invariant: profile.cohort -> pf -> landing screen -> storefront id + first tab id -> containers -> rails -> card route.</text>
  </g>
</svg>
